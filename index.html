<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>☕ ניהול לידים</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100%;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f4f5f7;color:#172b4d;direction:rtl}
body.modal-open{overflow:hidden}
.header{background:#0747a6;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 rgba(9,30,66,.16)}
.header h1{color:#fff;font-size:18px;font-weight:800}
.header p{color:#deebff;font-size:11px;margin-top:2px}
.header-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.sync-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;white-space:nowrap}
.btn-add,.btn-tool{border:none;border-radius:6px;padding:9px 12px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-add{background:#ffab00;color:#172b4d}.btn-tool{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.2)}
.stats{display:grid;grid-template-columns:repeat(6,minmax(110px,1fr));gap:10px;padding:14px 14px 0}
.stat-card{background:#fff;border:1px solid #dfe1e6;border-radius:8px;padding:12px 10px;box-shadow:0 1px 1px rgba(9,30,66,.10);cursor:pointer}
.stat-value{font-size:22px;font-weight:900;line-height:1.1;margin-top:4px}.stat-label{font-size:11px;color:#5e6c84;font-weight:800;margin-top:3px}.stat-icon{font-size:16px}
.tabs{padding:12px 14px 0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 13px;border:1px solid #dfe1e6;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;font-weight:800;background:#ebecf0;color:#42526e;font-family:inherit;white-space:nowrap;flex-shrink:0}
.tab.active{background:#fff;color:#0747a6;border-bottom-color:#fff}.tab.tab-danger.active{background:#ffebe6;color:#de350b;border-color:#ffbdad}
.filters{background:#fff;margin:0 14px;border:1px solid #dfe1e6;border-radius:0 8px 8px 8px;padding:12px;box-shadow:0 1px 1px rgba(9,30,66,.08);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filters input,.filters select{border:2px solid #dfe1e6;border-radius:6px;padding:8px 10px;font-size:14px;direction:rtl;outline:none;font-family:inherit;background:#fff}
.filters input:focus,.filters select:focus{border-color:#4c9aff}.filters input{flex:1;min-width:180px}.count{color:#6b778c;font-size:12px;white-space:nowrap;font-weight:800}
.table-wrap{margin:0 14px 28px;overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border:1px solid #dfe1e6;border-radius:0 0 8px 8px;box-shadow:0 1px 1px rgba(9,30,66,.08)}
th{padding:10px 12px;text-align:right;font-weight:900;font-size:11px;color:#5e6c84;cursor:pointer;user-select:none;white-space:nowrap;border-bottom:2px solid #dfe1e6;background:#fafbfc}
td{padding:10px 12px;font-size:12px;border-bottom:1px solid #ebecf0;white-space:nowrap;vertical-align:middle}
tr:hover td{background:#deebff!important}tr:nth-child(even) td{background:#fafbfc}tr.follow-due td{background:#fff7d6!important}.tr-clickable{cursor:pointer}
.badge{display:inline-flex;align-items:center;border-radius:3px;padding:3px 7px;font-size:11px;font-weight:900;line-height:1}
.owner-badge{border-radius:3px;padding:3px 7px;font-size:11px;font-weight:900}.status-select{border:1.5px solid #dfe1e6;border-radius:6px;padding:5px 8px;font-size:12px;font-weight:800;cursor:pointer;direction:rtl;font-family:inherit}
.priority-high{background:#ffebe6;color:#bf2600}.priority-medium{background:#fff0b3;color:#7a5d00}.priority-low{background:#e3fcef;color:#006644}
.contact-link{color:#0052cc;text-decoration:none;font-weight:800;direction:ltr;display:inline-block}.contact-link:hover{text-decoration:underline}
.cards{display:none;padding:0 14px 28px;flex-direction:column;gap:10px}
.card{background:#fff;border:1px solid #dfe1e6;border-radius:8px;padding:14px;box-shadow:0 1px 1px rgba(9,30,66,.08);cursor:pointer;border-right:5px solid #dfe1e6}.card.follow-due{background:#fff7d6;border-color:#f5cd47}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;gap:8px}.card-company{font-size:16px;font-weight:900;color:#172b4d;flex:1}.card-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;align-items:center}.card-label{font-size:11px;color:#6b778c;font-weight:800}.card-value{font-size:12px;color:#172b4d}.card-notes{font-size:12px;color:#42526e;margin-top:7px;padding-top:7px;border-top:1px solid #ebecf0;line-height:1.45}.mobile-status{border:1.5px solid #dfe1e6;border-radius:6px;padding:8px 10px;font-size:13px;font-weight:800;cursor:pointer;direction:rtl;font-family:inherit;width:100%;margin-top:8px;background:#fff}.empty{text-align:center;padding:48px 20px;color:#6b778c;background:#fff;border-radius:0 0 8px 8px}
#modal-wrap{position:fixed;inset:0;z-index:200;pointer-events:none;height:100dvh}#modal-wrap.open{pointer-events:all}.modal-bg{position:absolute;inset:0;background:rgba(9,30,66,.54);opacity:0;transition:opacity .2s}#modal-wrap.open .modal-bg{opacity:1}
.modal-box{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;padding:20px 18px 32px;max-height:88dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y;transform:translateY(100%);transition:transform .22s ease}#modal-wrap.open .modal-box{transform:translateY(0)}
.modal-handle{width:42px;height:4px;background:#dfe1e6;border-radius:2px;margin:0 auto 16px}.modal-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px}.modal-title h2{font-size:18px;font-weight:900}.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#6b778c;padding:4px;line-height:1}.section-title{margin:16px 0 10px;font-size:13px;font-weight:900;color:#42526e;border-top:1px solid #ebecf0;padding-top:14px}.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}.field{margin-bottom:12px}.field label{display:block;font-size:12px;color:#5e6c84;font-weight:900;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:2px solid #dfe1e6;border-radius:6px;padding:11px 12px;font-size:16px;direction:rtl;outline:none;font-family:inherit;background:#fff;-webkit-user-select:text;user-select:text}.field input:focus,.field select:focus,.field textarea:focus{border-color:#4c9aff;box-shadow:0 0 0 1px #4c9aff}.field input[type=date],.field input[type=time]{direction:ltr;text-align:right}.field textarea{resize:vertical;min-height:84px}
.modal-btns{display:flex;gap:10px;margin-top:16px;position:sticky;bottom:0;background:#fff;padding-top:10px;padding-bottom:max(6px,env(safe-area-inset-bottom));z-index:4}.btn-cancel,.btn-save,.btn-delete{padding:13px;border-radius:6px;cursor:pointer;font-size:15px;font-family:inherit;font-weight:900}.btn-cancel{border:1.5px solid #dfe1e6;background:#fff;color:#42526e;flex:1}.btn-save{border:none;background:#0052cc;color:#fff;flex:2}.btn-delete{border:1.5px solid #ffbdad;background:#ffebe6;color:#de350b;flex:1}.meeting-box{margin-top:16px;background:#deebff;border-radius:8px;padding:14px;border:1.5px solid #b3d4ff}.meeting-box-title{font-weight:900;font-size:14px;color:#0747a6;margin-bottom:12px}.meeting-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}.cal-btns{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}.btn-gcal,.btn-ics{flex:1;padding:10px;border-radius:6px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit}.btn-gcal{background:#0052cc;color:#fff;border:none}.btn-ics{background:#fff;color:#172b4d;border:1.5px solid #dfe1e6}
@media (min-width:760px){.modal-box{top:50%;bottom:auto;left:50%;right:auto;transform:translate(-50%,-40%);width:min(780px,92vw);max-height:90vh;border-radius:10px;opacity:0;transition:opacity .2s,transform .2s}#modal-wrap.open .modal-box{transform:translate(-50%,-50%);opacity:1}.modal-handle{display:none}}
@media (max-width:900px){.stats{grid-template-columns:repeat(3,minmax(100px,1fr))}}
@media (max-width:760px){.table-wrap{display:none}.cards{display:flex}.header{align-items:flex-start;padding:12px 10px}.header h1{font-size:15px}.header-actions{gap:6px}.sync-badge{display:none}.btn-tool{padding:8px 9px;font-size:12px}.btn-add{padding:8px 12px;font-size:13px}.stats{grid-template-columns:repeat(2,minmax(100px,1fr));padding-left:10px;padding-right:10px;gap:8px}.stat-value{font-size:19px}.modal-grid,.meeting-grid{grid-template-columns:1fr}.modal-box{max-height:88dvh;padding-bottom:max(28px,env(safe-area-inset-bottom))}.field input,.field select,.field textarea{font-size:16px}}

/* Stable search field */
#search-box {
  min-height: 38px;
  line-height: 20px;
  flex: 1 1 240px;
}

.stat-card,.tab,.card,.tr-clickable{pointer-events:auto;cursor:pointer}
</style>
</head>
<body>
<div id="modal-wrap">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title"><h2 id="modal-title-text">ליד</h2><button class="modal-close" onclick="closeModal()">✕</button></div>

    <div class="section-title">פרטי ליד</div>
    <div class="modal-grid">
      <div class="field"><label>שם חברה</label><input id="f_company" type="text" autocomplete="off"></div>
      <div class="field"><label>כמות עובדים</label><input id="f_employees" type="number" inputmode="numeric"></div>
      <div class="field"><label>מיקום</label><input id="f_location" type="text" autocomplete="off"></div>
      <div class="field"><label>חיבור / מקור</label><input id="f_connection" type="text" autocomplete="off"></div>
      <div class="field"><label>איש קשר</label><input id="f_contact" type="text" autocomplete="off"></div>
      <div class="field"><label>תפקיד</label><input id="f_role" type="text" autocomplete="off"></div>
      <div class="field"><label>טלפון</label><input id="f_phone" type="tel" inputmode="tel" style="direction:ltr;text-align:right" autocomplete="tel"></div>
      <div class="field"><label>מייל</label><input id="f_email" type="email" inputmode="email" style="direction:ltr;text-align:right" autocomplete="email"></div>
      <div class="field"><label>אחראי</label><select id="f_owner"></select></div>
      <div class="field"><label>רמת עדיפות</label><select id="f_priority"></select></div>
      <div class="field"><label>סטטוס</label><select id="f_status" onchange="updateMeetingSection()"></select></div>
      <div class="field"><label>תאריך פולואפ</label><input type="date" id="f_followUpDate"></div>
    </div>

    <div class="section-title">מידע עסקי</div>
    <div class="modal-grid">
      <div class="field"><label>האם נמצאים בחוזה קיים?</label><select id="f_hasContract"><option></option><option>כן</option><option>לא</option><option>לא ידוע</option></select></div>
      <div class="field"><label>ספק קיים</label><input id="f_supplier" type="text" autocomplete="off"></div>
      <div class="field"><label>סוג מכונות</label><input id="f_machineType" type="text" autocomplete="off"></div>
      <div class="field"><label>כמות מכונות</label><input id="f_machineCount" type="number" inputmode="numeric"></div>
      <div class="field"><label>צריכה חודשית קיימת/משוערת</label><input id="f_monthlyConsumption" type="text" autocomplete="off" placeholder="לדוגמה: 30 ק״ג בחודש"></div>
      <div class="field"><label>מחיר לקילו</label><input id="f_pricePerKg" type="number" inputmode="decimal" step="0.01"></div>
    </div>

    <div class="field"><label>פעולה הבאה</label><input id="f_nextAction" type="text" autocomplete="off" placeholder="לדוגמה: להתקשר, לשלוח הצעה, לקבוע פגישה"></div>
    <div class="field"><label>הערות</label><textarea id="f_notes" rows="3"></textarea></div>
    <div class="field"><label>תאריך עדכון אחרון</label><input type="text" id="f_lastUpdatedDisplay" readonly style="background:#f4f5f7;color:#5e6c84"></div>

    <div id="meeting-section" class="meeting-box" style="display:none">
      <div class="meeting-box-title">📅 פרטי פגישה</div>
      <div class="meeting-grid">
        <div class="field"><label>תאריך פגישה</label><input type="date" id="f_meetingDate"></div>
        <div class="field"><label>שעה</label><input type="time" id="f_meetingTime" value="09:00"></div>
      </div>
      <div class="field"><label>מיקום פגישה</label><input type="text" id="f_meetingLocation" placeholder="משרד הלקוח, זום, וכו׳" autocomplete="off"></div>
      <div class="field"><label>מייל לזימון (אופציונלי)</label><input type="email" id="f_meetingGuest" placeholder="email@example.com" style="direction:ltr;text-align:right"></div>
      <div class="cal-btns"><button class="btn-gcal" onclick="openGCal()">📆 פתח ב-Google Calendar</button><button class="btn-ics" onclick="buildICS()">⬇️ הורד ICS</button></div>
    </div>

    <div class="modal-btns"><button class="btn-delete" id="btn-delete-lead" onclick="deleteLead()" style="display:none">🗑️ מחק</button><button class="btn-cancel" onclick="closeModal()">ביטול</button><button class="btn-save" onclick="saveLead()">💾 שמור</button></div>
  </div>
</div>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
var DB_URL="https://mister-bean-default-rtdb.europe-west1.firebasedatabase.app/leads.json";
var STATUS_OPTIONS=[
  {label:"לא טופל",color:"#6b778c",bg:"#ebecf0"},
  {label:"בוצעה שיחה ראשונית",color:"#0052cc",bg:"#deebff"},
  {label:"בהמתנה לפרטים",color:"#974f0c",bg:"#fff0b3"},
  {label:"בהמתנה לקביעת פגישה",color:"#6554c0",bg:"#eae6ff"},
  {label:"נקבעה פגישה",color:"#403294",bg:"#eae6ff"},
  {label:"בהמתנה להצעת מחיר",color:"#00875a",bg:"#e3fcef"},
  {label:"נשלחה הצעת מחיר",color:"#006644",bg:"#abf5d1"},
  {label:"לפנייה עתידית",color:"#5243aa",bg:"#eae6ff"},
  {label:"נסגר",color:"#006644",bg:"#79f2c0"},
  {label:"לא רלוונטי",color:"#de350b",bg:"#ffebe6"}
];
var OLD_STATUS_MAP={"ממתין לחיבור":"בהמתנה לפרטים","נשלחה הצעה":"נשלחה הצעת מחיר","מנוהל":"בוצעה שיחה ראשונית"};
var PRIORITY_OPTIONS=["נמוכה","בינונית","גבוהה"];
var OWNERS=["בועז","בר","בועז/בר","אחר"];
var leads=[],activeTab="לידים בתהליך",filterStatus="הכל",filterOwner="הכל",search="",sortKey="followUpDate",sortDir="asc",syncStatus="idle",lastSync=null,currentLead=null,isAdding=false,statFilter=null,searchTimer=null,keepSearchFocus=false,keepSearchSelectionStart=0,keepSearchSelectionEnd=0,keepWindowScrollY=0;

function fbRead(){return fetch(DB_URL+"?t="+Date.now()).then(function(r){if(!r.ok)throw new Error("read failed");return r.json();});}
function fbWrite(d){return fetch(DB_URL,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}).then(function(r){if(!r.ok)throw new Error("write failed");return true;});}
function today(){return new Date().toISOString().split("T")[0];}
function isDue(d){return !!d&&d<=today();}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtDate(d){return d?d.split("-").reverse().join("/"):"—";}
function safeTel(t){return String(t||"").replace(/[^\d+]/g,"");}
function loadLocalBackup(){try{var raw=localStorage.getItem("misterBeanLeadsBackup");var p=raw?JSON.parse(raw):null;return Array.isArray(p)?p:null;}catch(e){return null;}}
function saveLocalBackup(d){try{localStorage.setItem("misterBeanLeadsBackup",JSON.stringify(d));}catch(e){}}
function normalizeLead(l){
  l=l||{}; if(OLD_STATUS_MAP[l.status])l.status=OLD_STATUS_MAP[l.status];
  if(l.phone&&!l.email&&String(l.phone).indexOf("@")>=0){l.email=l.phone;l.phone="";}
  ["company","location","connection","contact","role","phone","email","currentStatus","notes","nextAction","meetingDate","meetingLocation","meetingGuest","followUpDate","hasContract","supplier","machineType","monthlyConsumption","pricePerKg"].forEach(function(k){if(l[k]===undefined||l[k]===null)l[k]="";});
  if(!l.id)l.id=Date.now()+Math.floor(Math.random()*100000);
  if(!l.employees)l.employees=0; if(!l.owner)l.owner="בועז"; if(!l.status)l.status="לא טופל"; if(!l.sheet)l.sheet="ראשוני"; if(!l.lastUpdated)l.lastUpdated=today(); if(!l.meetingTime)l.meetingTime="09:00"; if(!l.priority)l.priority="בינונית"; if(l.machineCount===undefined)l.machineCount=""; if(l.deleted===undefined)l.deleted=false;
  return l;
}
function normalizeLeadsList(a){return(Array.isArray(a)?a:[]).map(function(l){return normalizeLead(l);});}

function isActiveProcessLead(l){
  l=normalizeLead(l);
  return !l.deleted
    && l.status!=="לא רלוונטי"
    && l.status!=="נסגר"
    && l.status!=="לפנייה עתידית"
    && l.status!=="נשלחה הצעת מחיר";
}
function processFutureLeads(){
  var changed=false;
  leads=leads.map(function(l){
    l=normalizeLead(l);
    if(!l.deleted && l.status==="לפנייה עתידית" && l.followUpDate && l.followUpDate<=today()){
      changed=true;
      return Object.assign({},l,{status:"לא טופל",priority:"גבוהה",lastUpdated:today()});
    }
    return l;
  });
  if(changed){
    saveLocalBackup(leads);
    fbWrite(leads).then(function(){lastSync=new Date();syncStatus="ok";updateBadge();}).catch(function(){syncStatus="error";updateBadge();});
  }
}

function saveLeads(nl){leads=normalizeLeadsList(nl);saveLocalBackup(leads);syncStatus="syncing";updateBadge();return fbWrite(leads).then(function(){lastSync=new Date();syncStatus="ok";updateBadge();return true;}).catch(function(){syncStatus="error";updateBadge();throw new Error("sync failed");});}
function updateBadge(){var b=document.getElementById("sync-badge");if(!b)return;var ic={idle:"⏳",syncing:"🔄",ok:"✅",error:"❌"},cl={idle:"#deebff",syncing:"#ffab00",ok:"#79f2c0",error:"#ffbdad"},lb={idle:"ממתין",syncing:"שומר...",ok:lastSync?("עודכן "+lastSync.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})):"מסונכרן",error:"שגיאה"};b.style.color=cl[syncStatus];b.innerHTML=ic[syncStatus]+" "+lb[syncStatus];}
function init(){
  fbRead().then(function(d){leads=normalizeLeadsList((d&&Array.isArray(d))?d:(loadLocalBackup()||[]));saveLocalBackup(leads);lastSync=new Date();syncStatus="ok";processFutureLeads();render();}).catch(function(){leads=normalizeLeadsList(loadLocalBackup()||[]);syncStatus="error";processFutureLeads();render();});
  setInterval(function(){var modalOpen=document.getElementById("modal-wrap")&&document.getElementById("modal-wrap").classList.contains("open");var active=document.activeElement;var typing=active&&["INPUT","TEXTAREA","SELECT"].indexOf(active.tagName)>=0;if(modalOpen||typing)return;fbRead().then(function(d){if(d&&Array.isArray(d)){leads=normalizeLeadsList(d);saveLocalBackup(leads);lastSync=new Date();syncStatus="ok";processFutureLeads();render();}}).catch(function(){syncStatus="error";updateBadge();});},15000);
}

function isTodayWorkLead(l){
  l=normalizeLead(l);
  return isActiveProcessLead(l) && (isDue(l.followUpDate) || l.priority==="גבוהה");
}
function cleanKey(v){
  return String(v||"").trim().toLowerCase().replace(/\s+/g," ");
}
function cleanPhone(v){
  return String(v||"").replace(/[^\d]/g,"");
}
function findDuplicateLead(candidate, excludeId){
  candidate=normalizeLead(candidate);
  var cCompany=cleanKey(candidate.company);
  var cPhone=cleanPhone(candidate.phone);
  var cEmail=cleanKey(candidate.email);

  return leads.find(function(l){
    l=normalizeLead(l);
    if(l.deleted) return false;
    if(excludeId && String(l.id)===String(excludeId)) return false;

    var sameCompany=cCompany && cleanKey(l.company)===cCompany;
    var samePhone=cPhone && cleanPhone(l.phone)===cPhone;
    var sameEmail=cEmail && cleanKey(l.email)===cEmail;

    return sameCompany || samePhone || sameEmail;
  });
}

function sOpt(s){return STATUS_OPTIONS.filter(function(x){return x.label===s;})[0]||STATUS_OPTIONS[0];}
function ownerStyle(o){if(o==="בועז")return"background:#deebff;color:#0747a6";if(o==="בר")return"background:#e3fcef;color:#006644";return"background:#fff0b3;color:#7a5d00";}
function pClass(p){if(p==="גבוהה")return"priority-high";if(p==="נמוכה")return"priority-low";return"priority-medium";}
function preserveSearchFocusBeforeRender(){
  var a=document.activeElement;
  keepWindowScrollY=window.scrollY||window.pageYOffset||0;
  if(a&&a.id==="search-box"){
    keepSearchFocus=true;
    try{
