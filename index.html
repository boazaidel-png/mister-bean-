<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #1e293b; direction: rtl; }
.header { background: #1e293b; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; position: sticky; top: 0; z-index: 50; }
.header h1 { color: #fff; font-size: 17px; font-weight: 800; }
.header p { color: #94a3b8; font-size: 11px; margin-top: 1px; }
.sync-badge { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.07); border-radius: 8px; padding: 5px 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.btn-add { background: #f59e0b; color: #fff; border: none; border-radius: 10px; padding: 9px 16px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
.stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; padding: 12px 12px 0; }
.stat-card { background: #fff; border-radius: 10px; padding: 10px 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); text-align: center; cursor: pointer; transition: transform 0.1s; }
.stat-card:active { transform: scale(0.96); }
.stat-icon { font-size: 16px; }
.stat-value { font-size: 20px; font-weight: 800; line-height: 1.2; }
.stat-label { font-size: 9px; color: #64748b; font-weight: 600; }
.tabs { padding: 10px 12px 0; display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 7px 13px; border: none; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 12px; font-weight: 700; background: transparent; color: #64748b; font-family: inherit; white-space: nowrap; flex-shrink: 0; }
.tab.active { background: #fff; color: #1e293b; }
.tab.tab-danger.active { background: #fef2f2; color: #ef4444; }
.filters { background: #fff; margin: 0 12px; border-radius: 0 12px 12px 12px; padding: 10px 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.filters input, .filters select { border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 7px 10px; font-size: 13px; direction: rtl; outline: none; font-family: inherit; }
.filters input { flex: 1; min-width: 140px; }
.count { color: #94a3b8; font-size: 12px; white-space: nowrap; }
.table-wrap { margin: 0 12px 24px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 0 0 12px 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
th { padding: 9px 12px; text-align: right; font-weight: 700; font-size: 11px; color: #64748b; cursor: pointer; user-select: none; white-space: nowrap; border-bottom: 2px solid #e2e8f0; background: #f8fafc; }
td { padding: 8px 12px; font-size: 12px; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
tr:hover td { background: #eff6ff !important; }
tr:nth-child(even) td { background: #fafbfc; }
.tr-clickable { cursor: pointer; }
.owner-badge { border-radius: 12px; padding: 2px 9px; font-size: 11px; font-weight: 700; }
.status-select { border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 3px 8px; font-size: 12px; font-weight: 700; cursor: pointer; direction: rtl; font-family: inherit; }
.cards { display: none; padding: 0 12px 24px; flex-direction: column; gap: 10px; }
.card { background: #fff; border-radius: 12px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); cursor: pointer; border-right: 4px solid #e2e8f0; }
.card:active { background: #f8fafc; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
.card-company { font-size: 16px; font-weight: 800; color: #1e293b; flex: 1; }
.card-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 5px; align-items: center; }
.card-label { font-size: 11px; color: #94a3b8; font-weight: 600; }
.card-value { font-size: 12px; color: #374151; }
.card-notes { font-size: 12px; color: #64748b; margin-top: 6px; padding-top: 6px; border-top: 1px solid #f1f5f9; line-height: 1.5; }
.mobile-status { border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 8px 10px; font-size: 13px; font-weight: 700; cursor: pointer; direction: rtl; font-family: inherit; width: 100%; margin-top: 8px; background: #fff; }
.empty { text-align: center; padding: 48px 20px; color: #94a3b8; background: #fff; border-radius: 0 0 12px 12px; }
#modal-wrap { position: fixed; inset: 0; z-index: 200; pointer-events: none; }
#modal-wrap.open { pointer-events: all; }
.modal-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s; }
#modal-wrap.open .modal-bg { opacity: 1; }
.modal-box { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 20px 20px 0 0; padding: 20px 18px 32px; max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch; transform: translateY(100%); transition: transform 0.25s ease; }
#modal-wrap.open .modal-box { transform: translateY(0); }
@media (min-width: 600px) {
  .modal-box { top: 50%; bottom: auto; left: 50%; right: auto; transform: translate(-50%, -40%); width: 580px; max-height: 90vh; border-radius: 16px; opacity: 0; transition: opacity 0.2s, transform 0.2s; }
  #modal-wrap.open .modal-box { transform: translate(-50%, -50%); opacity: 1; }
}
.modal-handle { width: 40px; height: 4px; background: #e2e8f0; border-radius: 2px; margin: 0 auto 16px; }
@media (min-width: 600px) { .modal-handle { display: none; } }
.modal-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-title h2 { font-size: 18px; font-weight: 800; }
.modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #94a3b8; padding: 4px; line-height: 1; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }
@media (max-width: 600px) { .modal-grid { grid-template-columns: 1fr; } }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; color: #64748b; font-weight: 600; margin-bottom: 4px; }
.field input, .field select, .field textarea { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 11px 12px; font-size: 16px; direction: rtl; outline: none; font-family: inherit; background: #fff; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: #3b82f6; }
.field input[type="date"], .field input[type="time"] { direction: ltr; text-align: right; }
.field textarea { resize: vertical; }
.modal-btns { display: flex; gap: 10px; margin-top: 16px; }
.btn-cancel { padding: 13px; border: 1.5px solid #e2e8f0; border-radius: 10px; background: #fff; cursor: pointer; font-size: 15px; color: #64748b; font-family: inherit; flex: 1; }
.btn-save { padding: 13px; border: none; border-radius: 10px; background: #1e293b; color: #fff; cursor: pointer; font-size: 15px; font-weight: 700; font-family: inherit; flex: 2; }
.meeting-box { margin-top: 16px; background: #f0f9ff; border-radius: 12px; padding: 14px; border: 1.5px solid #bae6fd; }
.meeting-box-title { font-weight: 700; font-size: 14px; color: #0369a1; margin-bottom: 12px; }
.meeting-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }
@media (max-width: 600px) { .meeting-grid { grid-template-columns: 1fr; } }
.cal-btns { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.btn-gcal { flex: 1; padding: 10px; background: #4285f4; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-ics { flex: 1; padding: 10px; background: #fff; color: #374151; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
@media (max-width: 700px) { .table-wrap { display: none; } .cards { display: flex; } }

html, body {
  width: 100%;
  min-height: 100%;
  overscroll-behavior: none;
}

body.modal-open { overflow: hidden; }

#modal-wrap {
  height: 100dvh;
}

.modal-box {
  overscroll-behavior: contain;
  touch-action: pan-y;
}

.field input,
.field select,
.field textarea {
  -webkit-user-select: text;
  user-select: text;
}

.btn-save:disabled {
  opacity: 0.65;
  cursor: not-allowed;
}

@media (max-width: 600px) {
  .modal-box {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    top: auto;
    width: 100%;
    max-height: 88dvh;
    padding-bottom: max(28px, env(safe-area-inset-bottom));
    border-radius: 20px 20px 0 0;
  }

  .modal-btns {
    position: sticky;
    bottom: 0;
    background: #fff;
    padding-top: 10px;
    padding-bottom: max(6px, env(safe-area-inset-bottom));
    z-index: 5;
  }
}


.btn-delete { padding: 13px; border: 1.5px solid #fecaca; border-radius: 10px; background: #fef2f2; cursor: pointer; font-size: 15px; color: #dc2626; font-family: inherit; flex: 1; font-weight: 700; }
.btn-delete:disabled { opacity: 0.65; cursor: not-allowed; }


.btn-tool { background: rgba(255,255,255,0.10); color: #fff; border: 1px solid rgba(255,255,255,0.18); border-radius: 10px; padding: 9px 12px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
.btn-tool:active { transform: scale(0.98); }
@media (max-width: 700px) { .header-actions { flex-wrap: wrap; justify-content: flex-end; gap: 6px !important; } .btn-tool { padding: 8px 9px; font-size: 12px; } }


/* Stability fix for mobile typing */
@media (max-width: 600px) {
  #modal-wrap.open .modal-box {
    transform: translateY(0);
  }

  .modal-box {
    will-change: auto;
    overflow-y: auto;
    overscroll-behavior-y: contain;
  }

  .field input,
  .field textarea,
  .field select {
    scroll-margin-bottom: 180px;
  }
}

<div id="modal-wrap">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <h2 id="modal-title-text">ליד</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-grid">
      <div class="field"><label>שם חברה</label><input id="f_company" type="text" autocomplete="off"></div>
      <div class="field"><label>כמות עובדים</label><input id="f_employees" type="number" inputmode="numeric"></div>
      <div class="field"><label>מיקום</label><input id="f_location" type="text" autocomplete="off"></div>
      <div class="field"><label>חיבור</label><input id="f_connection" type="text" autocomplete="off"></div>
      <div class="field"><label>איש קשר</label><input id="f_contact" type="text" autocomplete="off"></div>
      <div class="field"><label>תפקיד</label><input id="f_role" type="text" autocomplete="off"></div>
      <div class="field"><label>טלפון</label><input id="f_phone" type="tel" inputmode="tel" style="direction:ltr;text-align:right" autocomplete="tel"></div>
      <div class="field"><label>מייל</label><input id="f_email" type="email" inputmode="email" style="direction:ltr;text-align:right" autocomplete="email"></div>
      <div class="field"><label>אחראי</label><select id="f_owner"></select></div>
    </div>
    <div class="field"><label>מצב קיים</label><input id="f_currentStatus" type="text" autocomplete="off"></div>
    <div class="field" style="margin-top:8px"><label>סטטוס</label><select id="f_status" onchange="updateMeetingSection()"></select></div>
    <div class="field" style="margin-top:8px"><label>הערות</label><textarea id="f_notes" rows="3"></textarea></div>
    <div class="field" style="margin-top:8px"><label>תאריך עדכון</label><input type="date" id="f_lastUpdated"></div>

    <div id="meeting-section" class="meeting-box" style="display:none">
      <div class="meeting-box-title">📅 פרטי פגישה</div>
      <div class="meeting-grid">
        <div class="field"><label>תאריך פגישה</label><input type="date" id="f_meetingDate"></div>
        <div class="field"><label>שעה</label><input type="time" id="f_meetingTime" value="09:00"></div>
      </div>
      <div class="field"><label>מיקום פגישה</label><input type="text" id="f_meetingLocation" placeholder="משרד הלקוח, זום, וכו׳" autocomplete="off"></div>
      <div class="field"><label>מייל לזימון (אופציונלי)</label><input type="email" id="f_meetingGuest" placeholder="email@example.com" style="direction:ltr;text-align:right"></div>
      <div class="cal-btns">
        <button class="btn-gcal" onclick="openGCal()">📆 פתח ב-Google Calendar</button>
        <button class="btn-ics" onclick="buildICS()">⬇️ הורד ICS</button>
      </div>
    </div>

    <div class="modal-btns">
      <button class="btn-delete" id="btn-delete-lead" onclick="deleteLead()" style="display:none">🗑️ מחק</button>
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
      <button class="btn-save" onclick="saveLead()">💾 שמור</button>
    </div>
  </div>
</div>

function fbRead(){ return fetch(DB_URL+"?t="+Date.now()).then(function(r){if(!r.ok)throw 0;return r.json();}); }
function fbWrite(d){ return fetch(DB_URL,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}).then(function(r){if(!r.ok)throw 0;}); }


function loadLocalBackup(){
  try {
    var raw = localStorage.getItem("misterBeanLeadsBackup");
    var parsed = raw ? JSON.parse(raw) : null;
    return Array.isArray(parsed) ? parsed : null;
  } catch(e) {
    return null;
  }
}

function saveLocalBackup(data){
  try {
    localStorage.setItem("misterBeanLeadsBackup", JSON.stringify(data));
  } catch(e) {}
}

function saveLeads(nl){
  leads=normalizeLeadsList(nl);
  saveLocalBackup(nl);
  syncStatus="syncing";
  updateBadge();

  return fbWrite(leads).then(function(){
    lastSync=new Date();
    syncStatus="ok";
    updateBadge();
    return true;
  }).catch(function(){
    syncStatus="error";
    updateBadge();
    throw new Error("sync failed");
  });
}

function updateBadge(){
  var b=document.getElementById("sync-badge"); if(!b)return;
  var ic={idle:"⏳",syncing:"🔄",ok:"✅",error:"❌"};
  var cl={idle:"#94a3b8",syncing:"#f59e0b",ok:"#10b981",error:"#ef4444"};
  var lb={idle:"ממתין",syncing:"שומר...",ok:lastSync?("עודכן "+lastSync.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})):"מסונכרן",error:"שגיאה"};
  b.style.color=cl[syncStatus]; b.innerHTML=ic[syncStatus]+" "+lb[syncStatus];
}

function init(){
  fbRead().then(function(d){
    if(d&&Array.isArray(d)&&d.length>0){
      leads=normalizeLeadsList(d);
    } else {
      var localBackup=loadLocalBackup();
      leads=normalizeLeadsList((Array.isArray(localBackup)&&localBackup.length>0)?localBackup:INITIAL_LEADS);
      if(!(d&&Array.isArray(d)&&d.length>0)) fbWrite(leads).catch(function(){});
    }

    saveLocalBackup(leads);
    lastSync=new Date();
    syncStatus="ok";
    render();
  }).catch(function(){
    var localBackup=loadLocalBackup();
    leads=normalizeLeadsList((Array.isArray(localBackup)&&localBackup.length>0)?localBackup:INITIAL_LEADS);
    syncStatus="error";
    render();
  });

  setInterval(function(){
    var modalOpen=document.getElementById("modal-wrap")&&document.getElementById("modal-wrap").classList.contains("open");
    var active=document.activeElement;
    var typing=active&&["INPUT","TEXTAREA","SELECT"].indexOf(active.tagName)>=0;

    // Never refresh the app while the user is editing or typing.
    // This prevents keyboard closing, cursor loss and modal jumps.
    if(modalOpen||typing) return;

    fbRead().then(function(d){
      if(d&&Array.isArray(d)){
        leads=typeof normalizeLeadsList==="function"?normalizeLeadsList(d):d;
        if(typeof saveLocalBackup==="function") saveLocalBackup(leads);
        lastSync=new Date();
        syncStatus="ok";
        render();
      }
    }).catch(function(){
      syncStatus="error";
      updateBadge();
    });
  },15000);
}

function normalizeLead(l){
  l=l||{};
  if(l.phone && !l.email && String(l.phone).indexOf("@")>=0){
    l.email=l.phone;
    l.phone="";
  }
  if(!l.email) l.email="";
  if(!l.phone) l.phone="";
  if(!l.sheet) l.sheet="ראשוני";
  if(!l.status) l.status="לא טופל";
  if(!l.owner) l.owner="בועז";
  if(!l.id) l.id=Date.now()+Math.floor(Math.random()*100000);
  if(l.deleted===undefined) l.deleted=false;
  return l;
}
function normalizeLeadsList(arr){
  return (Array.isArray(arr)?arr:[]).map(function(l){return normalizeLead(l);});
}


function preserveSearchFocusBeforeRender(){
  var active=document.activeElement;
  if(active && active.id==="search-box"){
    keepSearchFocus=true;
    try {
      keepSearchSelectionStart=active.selectionStart || String(active.value||"").length;
      keepSearchSelectionEnd=active.selectionEnd || keepSearchSelectionStart;
    } catch(e) {
      keepSearchSelectionStart=String(active.value||"").length;
      keepSearchSelectionEnd=keepSearchSelectionStart;
    }
  }
}

function restoreSearchFocusAfterRender(){
  if(!keepSearchFocus) return;
  var input=document.getElementById("search-box");
  if(!input) {
    keepSearchFocus=false;
    return;
  }

  input.focus({preventScroll:true});
  try {
    var len=String(input.value||"").length;
    var start=Math.min(keepSearchSelectionStart,len);
    var end=Math.min(keepSearchSelectionEnd,len);
    input.setSelectionRange(start,end);
  } catch(e) {}

  keepSearchFocus=false;
}

function getFiltered(){
  return leads.filter(function(l){
    if(activeTab==="נמחקו" && !l.deleted) return false;
    if(activeTab!=="נמחקו" && l.deleted) return false;

    if(activeTab==="לא רלוונטי" && l.status!=="לא רלוונטי") return false;
    if(activeTab==="נסגר" && l.status!=="נסגר") return false;
    if(activeTab==="הצעות" && l.status!=="נשלחה הצעה") return false;
    if(activeTab==="פגישות" && l.status!=="נקבעה פגישה") return false;
    if(activeTab==="מתקדם" && l.sheet!=="מתקדם") return false;
    if(activeTab==="ראשוני" && l.sheet!=="ראשוני") return false;

    if(activeTab!=="כל הלידים" && activeTab!=="ראשוני" && activeTab!=="מתקדם" && activeTab!=="נסגר" && activeTab!=="לא רלוונטי" && activeTab!=="הצעות" && activeTab!=="פגישות" && activeTab!=="נמחקו") return false;

    if(activeTab==="כל הלידים" && (l.status==="לא רלוונטי" || l.status==="נסגר")) return false;
    if(activeTab==="ראשוני" && l.status==="לא רלוונטי") return false;
    if(activeTab==="מתקדם" && l.status==="לא רלוונטי") return false;

    if(statFilter){
      if(statFilter==="לידים בטיפול"){
        if(l.status==="לא טופל" || l.status==="לא רלוונטי" || l.status==="נסגר") return false;
      } else if(l.status!==statFilter){
        return false;
      }
    }

    if(filterStatus!=="הכל" && l.status!==filterStatus) return false;
    if(filterOwner!=="הכל" && l.owner!==filterOwner) return false;
    if(search){
      var q=search.toLowerCase();
      return [l.company,l.contact,l.connection,l.phone,l.email,l.notes,l.location,l.role,l.currentStatus].some(function(v){return (v||"").toLowerCase().indexOf(q)>=0;});
    }
    return true;
  }).sort(function(a,b){
    var av=a[sortKey]||"", bv=b[sortKey]||"";
    if(sortKey==="employees"){av=Number(av);bv=Number(bv);}
    if(av===bv) return 0;
    return sortDir==="asc"?(av>bv?1:-1):(av<bv?1:-1);
  });
}

function setTab(t){ activeTab=t; statFilter=null; render(); }
function setSearch(v){
  search=v;
  keepSearchFocus=true;

  var active=document.activeElement;
  if(active && active.id==="search-box"){
    try {
      keepSearchSelectionStart=active.selectionStart || String(v||"").length;
      keepSearchSelectionEnd=active.selectionEnd || keepSearchSelectionStart;
    } catch(e) {
      keepSearchSelectionStart=String(v||"").length;
      keepSearchSelectionEnd=keepSearchSelectionStart;
    }
  } else {
    keepSearchSelectionStart=String(v||"").length;
    keepSearchSelectionEnd=keepSearchSelectionStart;
  }

  render();
}
function setFilterStatus(v){ filterStatus=v; render(); }
function setFilterOwner(v){ filterOwner=v; render(); }
function setSort(k){ if(sortKey===k)sortDir=sortDir==="asc"?"desc":"asc"; else{sortKey=k;sortDir="asc";} render(); }
function toggleStatFilter(f){
  statFilter=(statFilter===f)?null:f;
  if(f) activeTab="כל הלידים";
  render();
}

function populateSelects(){
  var os=document.getElementById("f_owner");
  var ss=document.getElementById("f_status");
  if(os) os.innerHTML=OWNERS.map(function(o){return '<option>'+o+'</option>';}).join("");
  if(ss) ss.innerHTML=STATUS_OPTIONS.map(function(s){return '<option>'+s.label+'</option>';}).join("");
}

function updateMeetingSection(){
  var s=document.getElementById("f_status");
  var sec=document.getElementById("meeting-section");
  if(!s||!sec)return;
  sec.style.display=(s.value==="נקבעה פגישה")?"block":"none";
}

function openModalUI(){
  savedScrollY=window.scrollY||window.pageYOffset||0;
  var wrap=document.getElementById("modal-wrap");
  if(!wrap)return;

  wrap.classList.add("open");
  document.body.classList.add("modal-open");
  document.body.style.overflow="hidden";

  adjustModalForKeyboard();
}

function closeModal(){
  var wrap=document.getElementById("modal-wrap");
  if(wrap) wrap.classList.remove("open");

  document.body.classList.remove("modal-open");
  document.body.style.overflow="";
  document.body.style.top="";

  currentLead=null;
  isAdding=false;

  var saveBtn=document.querySelector(".btn-save");
  if(saveBtn){
    saveBtn.disabled=false;
    saveBtn.textContent="💾 שמור";
  }
}

function saveLead(){
  if(!currentLead){
    alert("שגיאה: לא נמצא ליד פעיל לשמירה");
    return;
  }

  var saveBtn=document.querySelector(".btn-save");
  if(saveBtn){
    saveBtn.disabled=true;
    saveBtn.textContent="שומר...";
  }

  var wasAdding=isAdding;

  var updated=Object.assign({},currentLead,{
    company:g("f_company").trim(), employees:Number(g("f_employees"))||0,
    location:g("f_location").trim(), connection:g("f_connection").trim(),
    contact:g("f_contact").trim(), role:g("f_role").trim(), phone:g("f_phone").trim(),
    email:g("f_email").trim(),
    owner:g("f_owner"), currentStatus:g("f_currentStatus").trim(),
    status:g("f_status"), notes:g("f_notes").trim(), lastUpdated:g("f_lastUpdated")||new Date().toISOString().split("T")[0],
    meetingDate:g("f_meetingDate"), meetingTime:g("f_meetingTime")||"09:00",
    meetingLocation:g("f_meetingLocation").trim(), meetingGuest:g("f_meetingGuest").trim(),
    sheet:currentLead.sheet||"ראשוני",
    deleted:!!currentLead.deleted,
    deletedAt:currentLead.deletedAt||""
  });

  if(!updated.company){
    alert("נא להזין שם חברה");
    if(saveBtn){
      saveBtn.disabled=false;
      saveBtn.textContent="💾 שמור";
    }
    return;
  }

  var nl;
  if(wasAdding){
    updated.id=Date.now();
    nl=leads.concat([updated]);
  } else {
    nl=leads.map(function(l){return l.id===updated.id?updated:l;});
  }

  saveLeads(nl).then(function(){
    closeModal();
    render();
  }).catch(function(){
    closeModal();
    render();
    alert("הליד נשמר מקומית במכשיר, אבל לא הצליח להסתנכרן לענן. בדוק חיבור אינטרנט או הרשאות Firebase.");
  });
}


function deleteLead(){
  if(!currentLead || !currentLead.id){
    alert("לא ניתן למחוק ליד שלא נשמר עדיין");
    return;
  }

  var company=currentLead.company||g("f_company")||"הליד הזה";
  var ok=confirm("למחוק את " + company + " מהרשימה? הליד יעבור לכרטיסיית נמחקו.");
  if(!ok) return;

  var delBtn=document.getElementById("btn-delete-lead");
  if(delBtn){
    delBtn.disabled=true;
    delBtn.textContent="מוחק...";
  }

  var nl=leads.map(function(l){
    return l.id===currentLead.id ? Object.assign({},l,{deleted:true,deletedAt:new Date().toISOString(),lastUpdated:new Date().toISOString().split("T")[0]}) : l;
  });

  saveLeads(nl).then(function(){
    closeModal();
    activeTab="נמחקו";
    render();
  }).catch(function(){
    closeModal();
    activeTab="נמחקו";
    render();
    alert("הליד נמחק מקומית, אבל לא הצליח להסתנכרן לענן.");
  });
}

function updateStatus(id,status){
  var nl=leads.map(function(l){return l.id===id?Object.assign({},l,{status:status,lastUpdated:new Date().toISOString().split("T")[0]}):l;});
  leads=nl;
  saveLocalBackup(nl);
  render();

  saveLeads(nl).catch(function(){
    alert("השינוי נשמר מקומית במכשיר, אבל לא הצליח להסתנכרן לענן.");
  });

  if(status==="לא רלוונטי"&&activeTab!=="לא רלוונטי"){
    setTimeout(function(){activeTab="לא רלוונטי";render();},400);
  }
}


function adjustModalForKeyboard(){
  // Intentionally minimal.
  // Previous versions forced scroll/height changes on every keyboard movement,
  // which caused mobile text fields to jump and lose typing flow.
  var box=document.querySelector(".modal-box");
  if(!box)return;
  if(window.innerWidth<=600){
    box.style.maxHeight="88dvh";
    box.style.paddingBottom="max(28px, env(safe-area-inset-bottom))";
  }
}

if(window.visualViewport){
  window.visualViewport.addEventListener("resize",adjustModalForKeyboard);
}

function buildGCalLink(){
  var company=g("f_company"), date=g("f_meetingDate"), time=g("f_meetingTime")||"09:00", loc=g("f_meetingLocation"), guest=g("f_meetingGuest");
  if(!date)return null;
  var parts=date.split("-"), tparts=time.split(":");
  var y=parts[0],m=parts[1],d=parts[2],h=tparts[0],min=tparts[1]||"00";
  var pad=function(n){return String(n).padStart(2,"0");};
  var start=y+m+d+"T"+pad(h)+pad(min)+"00";
  var endH=String((parseInt(h)+1)%24).padStart(2,"0");
  var end=y+m+d+"T"+endH+pad(min)+"00";
  return "https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent("פגישה — "+company)+"&dates="+start+"/"+end+"&location="+encodeURIComponent(loc)+"&add="+encodeURIComponent(guest)+"&sf=true&output=xml";
}

function openGCal(){
  var link=buildGCalLink();
  if(!link){alert("נא להזין תאריך לפגישה");return;}
  window.open(link,"_blank");
}

function buildICS(){
  var company=g("f_company")||"פגישה", date=g("f_meetingDate"), time=g("f_meetingTime")||"09:00", loc=g("f_meetingLocation"), guest=g("f_meetingGuest");
  if(!date){alert("נא להזין תאריך לפגישה");return;}
  var parts=date.split("-"), tparts=time.split(":");
  var y=parts[0],m=parts[1],d=parts[2],h=tparts[0],min=tparts[1]||"00";
  var pad=function(n){return String(n).padStart(2,"0");};
  var start=y+m+d+"T"+pad(h)+pad(min)+"00";
  var endH=String((parseInt(h)+1)%24).padStart(2,"0");
  var end=y+m+d+"T"+endH+pad(min)+"00";
  var attendee=guest?"ATTENDEE;RSVP=TRUE:mailto:"+guest+"\n":"";
  var ics="BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nUID:"+Date.now()+"@leads\nSUMMARY:פגישה — "+company+"\nDTSTART:"+start+"\nDTEND:"+end+"\nLOCATION:"+loc+"\n"+attendee+"END:VEVENT\nEND:VCALENDAR";
  var blob=new Blob([ics],{type:"text/calendar"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="פגישה-"+company+".ics";
  a.click();
}


function safeExcelValue(v){
  return v===undefined||v===null ? "" : String(v);
}
function exportToExcel(){
  var data=leads.filter(function(l){return !l.deleted;}).map(function(l){
    return {
      "שם חברה":safeExcelValue(l.company),
      "כמות עובדים":l.employees||"",
      "מיקום":safeExcelValue(l.location),
      "חיבור":safeExcelValue(l.connection),
      "איש קשר":safeExcelValue(l.contact),
      "תפקיד":safeExcelValue(l.role),
      "טלפון":safeExcelValue(l.phone),
      "מייל":safeExcelValue(l.email),
      "אחראי":safeExcelValue(l.owner),
      "מצב קיים":safeExcelValue(l.currentStatus),
      "סטטוס":safeExcelValue(l.status),
      "הערות":safeExcelValue(l.notes),
      "תאריך עדכון":safeExcelValue(l.lastUpdated),
      "כרטיסייה":safeExcelValue(l.sheet),
      "תאריך פגישה":safeExcelValue(l.meetingDate),
      "שעת פגישה":safeExcelValue(l.meetingTime),
      "מיקום פגישה":safeExcelValue(l.meetingLocation),
      "מייל לזימון":safeExcelValue(l.meetingGuest)
    };
  });
  if(!data.length){alert("אין לידים לייצוא");return;}
  if(!window.XLSX){exportToCSV(data);return;}
  var ws=XLSX.utils.json_to_sheet(data);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Leads");
  XLSX.writeFile(wb,"mister-bean-leads-"+new Date().toISOString().split("T")[0]+".xlsx");
}
function exportToCSV(data){
  var headers=Object.keys(data[0]);
  var csv="\ufeff"+headers.join(",")+"\n"+data.map(function(row){
    return headers.map(function(h){return '"'+String(row[h]||"").replace(/"/g,'""')+'"';}).join(",");
  }).join("\n");
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="mister-bean-leads-"+new Date().toISOString().split("T")[0]+".csv";
  a.click();
}
function triggerImport(){
  var input=document.getElementById("excel-import-input");
  if(input){input.value="";input.click();}
}
function pick(row,names){
  for(var i=0;i<names.length;i++){
    if(row[names[i]]!==undefined&&row[names[i]]!==null&&String(row[names[i]]).trim()!=="") return String(row[names[i]]).trim();
  }
  return "";
}
function excelDateToISO(v){
  if(!v)return "";
  if(typeof v==="number"&&window.XLSX&&XLSX.SSF){
    var d=XLSX.SSF.parse_date_code(v);
    if(d)return String(d.y).padStart(4,"0")+"-"+String(d.m).padStart(2,"0")+"-"+String(d.d).padStart(2,"0");
  }
  var s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)){
    var p=s.split("/");
    return p[2]+"-"+p[1].padStart(2,"0")+"-"+p[0].padStart(2,"0");
  }
  return s;
}
function rowToLead(row){
  return normalizeLead({
    id:Date.now()+Math.floor(Math.random()*1000000),
    company:pick(row,["שם חברה","חברה","company","Company","שם עסק"]),
    employees:Number(pick(row,["כמות עובדים","עובדים","employees","Employees"]))||0,
    location:pick(row,["מיקום","location","Location","כתובת"]),
    connection:pick(row,["חיבור","מקור","connection","Connection","source","Source"]),
    contact:pick(row,["איש קשר","contact","Contact","שם איש קשר"]),
    role:pick(row,["תפקיד","role","Role"]),
    phone:pick(row,["טלפון","מספר טלפון","phone","Phone","mobile","Mobile"]),
    email:pick(row,["מייל","אימייל","email","Email","e-mail","E-mail"]),
    owner:pick(row,["אחראי","owner","Owner"])||"בועז",
    currentStatus:pick(row,["מצב קיים","currentStatus","Current Status"]),
    status:pick(row,["סטטוס","status","Status"])||"לא טופל",
    notes:pick(row,["הערות","notes","Notes"]),
    sheet:pick(row,["כרטיסייה","sheet","Sheet"])||"ראשוני",
    lastUpdated:excelDateToISO(pick(row,["תאריך עדכון","lastUpdated","Last Updated"]))||new Date().toISOString().split("T")[0],
    meetingDate:excelDateToISO(pick(row,["תאריך פגישה","meetingDate","Meeting Date"])),
    meetingTime:pick(row,["שעת פגישה","שעה","meetingTime","Meeting Time"]),
    meetingLocation:pick(row,["מיקום פגישה","meetingLocation","Meeting Location"]),
    meetingGuest:pick(row,["מייל לזימון","meetingGuest","Meeting Guest"]),
    deleted:false
  });
}
function importFromExcel(event){
  var file=event.target.files&&event.target.files[0];
  if(!file)return;
  if(!window.XLSX){alert("רכיב הייבוא לא נטען. בדוק חיבור אינטרנט ואז נסה שוב.");return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var workbook=XLSX.read(data,{type:"array"});
      var firstSheet=workbook.Sheets[workbook.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(firstSheet,{defval:""});
      var imported=rows.map(rowToLead).filter(function(l){return l.company;});
      if(imported.length===0){alert("לא נמצאו שורות עם שם חברה בקובץ.");return;}
      var replace=confirm("נמצאו "+imported.length+" לידים בקובץ.\n\nאישור = להחליף את כל הרשימה הקיימת.\nביטול = להוסיף לרשימה הקיימת.");
      var nl=replace?imported:leads.concat(imported);
      saveLeads(nl).then(function(){render();alert("הייבוא הסתיים בהצלחה. נוספו/נטענו "+imported.length+" לידים.");}).catch(function(){render();alert("הייבוא נשמר מקומית, אבל לא הסתנכרן לענן.");});
    }catch(err){
      alert("שגיאה בייבוא הקובץ. ודא שזה קובץ Excel או CSV תקין.");
    }
  };
  reader.readAsArrayBuffer(file);
}
